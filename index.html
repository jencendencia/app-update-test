<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>App Update Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    .tab-bar {
      display: flex;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
    }
    .tab-btn {
      flex: 1;
      padding: 0.7rem;
      background: transparent;
      color: #888;
      border: none;
      cursor: pointer;
      font-size: 0.95rem;
      transition: all 0.2s;
    }
    .tab-btn:hover { color: #eee; background: #1a1a2e; }
    .tab-btn.active { color: #eee; border-bottom: 2px solid #0f3460; background: #1a1a2e; }
    .tab-content { display: none; flex: 1; }
    .tab-content.active { display: flex; }
    .home {
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .home-card {
      background: #16213e;
      border-radius: 16px;
      padding: 2.5rem 3rem;
      text-align: center;
      border: 1px solid #0f3460;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }
    .home .icon {
      font-size: 4rem;
      line-height: 1;
      margin-bottom: 0.5rem;
      filter: drop-shadow(0 4px 8px rgba(15, 52, 96, 0.5));
    }
    .home h2 {
      font-size: 1.5rem;
      font-weight: 600;
      background: linear-gradient(135deg, #e94560, #0f3460);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }
    .home p {
      color: #888;
      font-size: 0.85rem;
      line-height: 1.5;
    }
    .home .badge {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.25rem 0.8rem;
      background: #0f3460;
      border-radius: 20px;
      font-size: 0.75rem;
      color: #aaa;
    }
    .settings {
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 0.5rem;
      padding: 1rem;
    }
    .version { color: #888; font-size: 0.85rem; }
    button {
      background: #0f3460;
      color: #eee;
      border: none;
      padding: 0.6rem 1.8rem;
      font-size: 1rem;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover { background: #1a1a52; }
    #status {
      font-size: 0.82rem;
      color: #aaa;
      min-height: 2rem;
      max-width: 300px;
    }
  </style>
</head>
<body>
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="home">Home</button>
    <button class="tab-btn" data-tab="settings">Settings</button>
  </div>

  <div class="tab-content home active" id="tab-home">
    <div class="home-card">
      <div class="icon">&#9889;</div>
      <h2>App Update Test</h2>
      <p>An updatable Electron application<br/>powered by GitHub Releases.</p>
      <span class="badge" id="homeVersion">v1.0.9</span>
    </div>
  </div>

  <div class="tab-content settings" id="tab-settings">
    <p class="version" id="version"></p>
    <button id="updateBtn">Check for Updates</button>
    <p id="status">Click the button to check for updates.</p>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
